name: rds-credit
on: [workflow_dispatch]
permissions:
  id-token: write
  contents: read
env:
  DB_ID: free-tier-credit-db
jobs:
  rds:
    runs-on: ubuntu-latest
    steps:
      - name: AWS creds (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Create db.t3.micro (postgres)
        run: |
          PW=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 20)
          aws rds create-db-instance \
            --db-instance-identifier "$DB_ID" \
            --engine postgres \
            --db-instance-class db.t3.micro \
            --allocated-storage 20 \
            --master-username labadmin \
            --master-user-password "$PW" \
            --backup-retention-period 0 \
            --no-multi-az \
            --no-publicly-accessible
          echo "Creating $DB_ID..."

      - name: Wait until available
        run: aws rds wait db-instance-available --db-instance-identifier "$DB_ID"

      - name: Delete
        if: always()
        run: |
          aws rds delete-db-instance \
            --db-instance-identifier "$DB_ID" \
            --skip-final-snapshot --delete-automated-backups || true
          aws rds wait db-instance-deleted --db-instance-identifier "$DB_ID" || true
          echo "Deleted $DB_ID"